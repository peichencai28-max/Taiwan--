<!DOCTYPE html>
<html>
<head>
<title>可愛版貪吃蛇</title>
<style>
body {
  background-color: #f0f8ff; /* 淺藍色背景 */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

#gameCanvas {
  background-color: #fce4ec; /* 柔和的粉紅色遊戲背景 */
  border: 5px solid #ff80ab; /* 柔和的粉紅色邊框 */
  border-radius: 10px; /* 圓角邊框 */
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gridSize = 20;
let snake = [{ x: 10, y: 10 }];
let food = {};
let direction = "right";
let score = 0;
let gameInterval;

// 可愛的小圖案 (這裡使用簡單的圓形和愛心代替)
function drawSnakePart(part) {
  ctx.fillStyle = "#ff80ab"; /* 柔和的粉紅色蛇 */
  ctx.beginPath();
  ctx.arc(part.x * gridSize + gridSize / 2, part.y * gridSize + gridSize / 2, gridSize / 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawFood() {
  ctx.fillStyle = "#ffc107"; /* 黃色食物 */
  ctx.beginPath();
  // 畫一個簡單的愛心形狀
  ctx.moveTo(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 4);
  ctx.bezierCurveTo(food.x * gridSize + gridSize / 2, food.y * gridSize, food.x * gridSize, food.y * gridSize, food.x * gridSize, food.y * gridSize + gridSize / 4);
  ctx.bezierCurveTo(food.x * gridSize, food.y * gridSize + gridSize / 2, food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize, food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize);
  ctx.bezierCurveTo(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize, food.x * gridSize + gridSize, food.y * gridSize + gridSize / 2, food.x * gridSize + gridSize, food.y * gridSize + gridSize / 4);
  ctx.bezierCurveTo(food.x * gridSize + gridSize, food.y * gridSize, food.x * gridSize + gridSize / 2, food.y * gridSize, food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 4);
  ctx.fill();
}

// 遊戲邏輯
function gameLoop() {
  // 移動蛇
  const head = { x: snake[0].x, y: snake[0].y };
  switch (direction) {
    case "up": head.y--; break;
    case "down": head.y++; break;
    case "left": head.x--; break;
    case "right": head.x++; break;
  }
  snake.unshift(head);

  // 檢查是否吃到食物
  if (head.x === food.x && head.y === food.y) {
    score++;
    generateFood();
  } else {
    snake.pop();
  }

  // 檢查是否碰撞
  if (head.x < 0 || head.x >= canvas.width / gridSize || head.y < 0 || head.y >= canvas.height / gridSize || checkCollision()) {
    clearInterval(gameInterval);
    alert("遊戲結束！得分：" + score);
  }

  // 清除畫布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 繪制蛇和食物
  snake.forEach(drawSnakePart);
  drawFood();
}

// 檢查蛇是否撞到自己
function checkCollision() {
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
      return true;
    }
  }
  return false;
}

// 隨機生成食物
function generateFood() {
  food = {
    x: Math.floor(Math.random() * (canvas.width / gridSize)),
    y: Math.floor(Math.random() * (canvas.height / gridSize))
  };
}

// 處理鍵盤輸入
document.addEventListener("keydown", e => {
  switch (e.key) {
    case "ArrowUp": if (direction !== "down") direction = "up"; break;
    case "ArrowDown": if (direction !== "up") direction = "down"; break;
    case "ArrowLeft": if (direction !== "right") direction = "left"; break;
    case "ArrowRight": if (direction !== "left") direction = "right"; break;
  }
});

// 開始遊戲
generateFood();
gameInterval = setInterval(gameLoop, 100); // 調整遊戲速度

</script>
</body>
</html>
