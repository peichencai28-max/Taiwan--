<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新年 - 手寫春聯</title>
    <style>
        body {
            background-color: #fdf2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #b71c1c; margin-bottom: 10px; }
        .controls { margin-bottom: 15px; }
        
        /* 柔和的紅色春聯紙 */
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 8px solid #ffab91;
            border-radius: 5px;
        }
        canvas {
            background-color: #ff5252; /* 柔和紅 */
            cursor: crosshair;
            display: block;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #ff8a80; }
        .tip { color: #795548; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>新年</h1>
    
    <div class="controls">
        <button onclick="clearCanvas()">重新書寫</button>
        <button onclick="download()">儲存春聯</button>
    </div>

    <div id="canvas-container">
        <canvas id="chunlian" width="200" height="600"></canvas>
    </div>

    <p class="tip">✨ 提示：使用滑鼠或手指在紅紙上揮毫吧！</p>

    <script>
        const canvas = document.getElementById('chunlian');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // 設定筆觸樣式：金墨水
        ctx.strokeStyle = "#ffd700"; // 金色
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // 開始繪圖
        function start(e) {
            drawing = true;
            draw(e);
        }

        // 結束繪圖
        function stop() {
            drawing = false;
            ctx.beginPath();
        }

        // 繪圖過程
        function draw(e) {
            if (!drawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // 監聽滑鼠事件
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stop);

        // 監聽觸控事件 (手機平板)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stop);

        // 清除畫布
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 儲存圖片
        function download() {
            const link = document.createElement('a');
            link.download = '我的春聯.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
