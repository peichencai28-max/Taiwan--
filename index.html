<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新年</title>
    <style>
        body {
            background-color: #fff5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            overflow: hidden;
        }
        h1 { color: #d32f2f; margin-top: 20px; }
        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #ffebee;
            border: 5px solid #ffab91;
            border-radius: 15px;
            overflow: hidden;
            cursor: none;
        }
        .info {
            font-size: 1.2rem;
            color: #5d4037;
            margin: 10px;
        }
        #basket {
            position: absolute;
            bottom: 10px;
            width: 60px;
            height: 40px;
            background-color: #ff8a80;
            border-radius: 10px 10px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        .hongbao {
            position: absolute;
            width: 30px;
            height: 40px;
            background-color: #ef5350;
            border-radius: 4px;
            border: 2px solid #ffca28;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffca28;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>新年</h1>
    <div class="info">分數: <span id="score">0</span> | 剩餘時間: <span id="timer">30</span>s</div>
    
    <div id="game-container" id="gameArea">
        <div id="basket">🧧</div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const basket = document.getElementById('basket');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');

        let score = 0;
        let timeLeft = 30; // 遊戲時間設定（秒）
        let gameActive = true;

        // 籃子跟隨滑鼠移動
        container.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            let rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left - basket.offsetWidth / 2;
            if (x < 0) x = 0;
            if (x > container.offsetWidth - basket.offsetWidth) x = container.offsetWidth - basket.offsetWidth;
            basket.style.left = x + 'px';
        });

        // 產生紅包
        function createHongbao() {
            if (!gameActive) return;
            const hb = document.createElement('div');
            hb.className = 'hongbao';
            hb.innerText = '福';
            hb.style.left = Math.random() * (container.offsetWidth - 30) + 'px';
            hb.style.top = '-50px';
            container.appendChild(hb);

            let top = -50;
            const fallInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(fallInterval);
                    hb.remove();
                    return;
                }
                top += 4; // 下落速度
                hb.style.top = top + 'px';

                // 碰撞檢測
                let bRect = basket.getBoundingClientRect();
                let hRect = hb.getBoundingClientRect();

                if (hRect.bottom >= bRect.top && hRect.right >= bRect.left && hRect.left <= bRect.right && hRect.top <= bRect.bottom) {
                    score++;
                    scoreElement.innerText = score;
                    clearInterval(fallInterval);
                    hb.remove();
                }

                if (top > container.offsetHeight) {
                    clearInterval(fallInterval);
                    hb.remove();
                }
            }, 20);
        }

        // 遊戲計時器
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                clearInterval(countdown);
                clearInterval(spawnInterval);
                alert("恭喜發財！遊戲結束！\n你一共接到了 " + score + " 個紅包！");
                location.reload(); // 重新開始
            }
        }, 1000);

        const spawnInterval = setInterval(createHongbao, 600);

    </script>
</body>
</html>
