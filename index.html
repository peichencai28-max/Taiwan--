<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新年快樂 - 互動遊戲教室</title>
    <style>
        :root {
            --soft-red: #ff7675;      /* 柔和的紅色 */
            --warm-cream: #fff9f0;   /* 溫暖的奶油白 */
            --gold-accent: #fab1a0;  /* 柔和的橘金色 */
            --text-color: #4a4a4a;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--warm-cream);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 標題裝飾區 */
        header {
            background-color: var(--soft-red);
            color: white;
            width: 100%;
            padding: 35px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 118, 117, 0.2);
            position: relative;
        }

        header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 2px; }
        header .deco { position: absolute; font-size: 40px; top: 20px; }

        /* 按鈕選單 */
        .menu {
            display: flex;
            gap: 12px;
            margin: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu button {
            background: white;
            color: var(--soft-red);
            border: 2px solid var(--soft-red);
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0px var(--soft-red);
        }

        .menu button:active { transform: translateY(4px); box-shadow: none; }
        .menu button.active-btn { background: var(--soft-red); color: white; }

        /* 遊戲與內容容器 */
        .container {
            width: 85%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none
